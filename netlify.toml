# Shamli Physiotherapy Clinic — Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."
  # Auto-minify CSS and JS on every Netlify deploy (saves ~11 KiB)
  command = "npx clean-css-cli@5 -o css/style.css css/style.css && npx terser js/app.js -o js/app.js --compress && npx terser js/main.js -o js/main.js --compress"

# Force HTTPS
[[redirects]]
  from = "http://shamliphysiotherapy.com/*"
  to = "https://shamliphysiotherapy.com/:splat"
  status = 301
  force = true

# www → non-www (prevents duplicate content in search engines)
[[redirects]]
  from = "https://www.shamliphysiotherapy.com/*"
  to = "https://shamliphysiotherapy.com/:splat"
  status = 301
  force = true

# Clean URLs (extension-free paths)
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/doctors"
  to = "/doctors.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/thankyou"
  to = "/thankyou.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# Block /docs/ from public access (internal documentation)
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

# Explicitly allow static files that must be reachable by crawlers
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = false

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = false

# Custom 404 (must be last — catch-all)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security & performance headers (global)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' https://img.youtube.com https://maps.gstatic.com https://lh3.googleusercontent.com https://streetviewpixels-pa.googleapis.com data:; frame-src https://www.youtube.com https://www.google.com https://maps.google.com; connect-src 'self' https://fonts.googleapis.com;"

# Cache images aggressively (1 year)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache CSS and JS (30 days)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
